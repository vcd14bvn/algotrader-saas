# Koyeb deployment config — Free tier: 1 vCPU, 512MB RAM, always-on
# Deploy via: koyeb deploy . --app algotrader-backend --config koyeb.yaml
name: algotrader-backend
type: web
runtime: python
buildCommand: pip install -r requirements.txt
startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
port: 8000
healthCheck:
  path: /health
  interval: 30
