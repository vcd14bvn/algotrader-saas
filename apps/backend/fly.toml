app = "algotrader-backend"
primary_region = "sin"   # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true    # stops when idle (saves cost)
  auto_start_machines = true   # starts on first request
  min_machines_running = 0     # 0 = scale-to-zero (free)

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256    # minimal RAM — enough for FastAPI
